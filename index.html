<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Azure Face Detection App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app-bg">
    <div class="app-inner">

      <div class="app-header">
        <div class="app-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4b8de8" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            <path d="M18 5c1.5 0 3 1 3 3s-1.5 2.5-3 2.5" stroke="#2a6bbf"/>
          </svg>
        </div>
        <div>
          <div class="app-title">Face Detection</div>
          <div class="app-sub">Powered by Azure AI Vision</div>
        </div>
      </div>

      <!-- Config -->
      <div class="card">
        <div class="card-label">Azure Configuration</div>
        <div class="input-row">
          <input type="text" id="endpoint" placeholder="Endpoint URL  e.g. https://xxxx.cognitiveservices.azure.com/" />
          <input type="text" id="apiKey" placeholder="API Key" />
        </div>
      </div>

      <!-- Upload -->
      <div class="card">
        <div class="card-label">Image Upload</div>
        <div class="upload-zone" id="dropzone">
          <input type="file" id="imageInput" accept="image/*" onchange="handleFile(event)" />
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4b8de8" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M3 15l5-5 4 4 3-3 6 6"/>
            </svg>
          </div>
          <div class="upload-text">Click or drag an image here</div>
          <div class="upload-hint">JPG, PNG, WEBP — up to 4 MB</div>
        </div>
        <button class="btn" onclick="detectFace()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Detect Face
        </button>
      </div>

      <!-- Preview -->
      <div class="card">
        <div class="card-label">Preview</div>
        <div class="preview-area" id="previewArea">
          <div class="preview-placeholder" id="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4b8de8" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M3 15l5-5 4 4 3-3 6 6"/>
            </svg>
            <p>No image selected</p>
          </div>
          <img id="previewImage" />
          <canvas id="canvas"></canvas>
        </div>
      </div>

      <!-- Result -->
      <div class="card" id="resultCard" style="display:none;">
        <div class="card-label">Detection Results</div>
        <div id="result"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
